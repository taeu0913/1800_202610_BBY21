<!DOCTYPE html>
<html lang="en">

<head>
  <title>Crowd/Source</title>
  <meta name="comp1800 template" content="My 1800 App">

  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Other libraries go here -->
  <link rel="stylesheet" href="styles/style.css">

    <link rel="stylesheet" href="./node_modules/leaflet/dist/leaflet.css" />
    <script src="./node_modules/leaflet/dist/leaflet.js"></script>
</head>

<body>

  <!------------------------------>
  <!-- Your HTML Layout go here -->
  <!------------------------------>
  <!-- Stuff for body goes here -->
  
  <nav-bar></nav-bar>

  <div class="menu" id="menu">
    <a href="#">Profile</a>
    <a href="#">Settings</a>
    <a href="#">Help</a>
  </div>
  <div id="content-wrapper">
    <div id="search"></div>

    <div id="map"></div>
    
    <div id="location-popup" style="display: none;">
      <button id="close-location-button" onclick="showLocationDetails()" type="button">X</button>
      <div id="location-content">
        <div id="location-name">
          <h1>Location Name</h1>
        </div>
        <div id="crowd-info">
          Crowd Estimate: 20 people
        </div>
        <button id="rate-location-button" type="button">Rate</button>
        <div id="location-feed">
          <div class="post">
            <div class="user">
              <img src="images/account.png" alt="profile-picture"/>
              <p class="user-name">User Name</p>
              <div class="timestamp">
                <small>5 minutes ago</small>
              </div>
            </div>
            <div class="post-content">
              <img src="images/BBY01.jpg"/>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <real-footer></real-footer>
  <!---------------------------------------------->
  <!-- Your own JavaScript functions go here    -->
  <!---------------------------------------------->

  <!-- Link to scripts of your own -->
  <script src="src/main.js"></script>
  <script src="src/NavBarTemplate.js"></script>
  <script src="src/FooterTemplate.js"></script>
  <script src="leaflet/leaflet.js"></script>

  <!-- <script type="module" src="./src/main.js"></script> -->

</body>

</html>
