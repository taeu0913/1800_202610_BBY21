<!DOCTYPE html>
<html lang="en">

<head>
  <title>Crowd/Source</title>
  <meta name="comp1800 template" content="My 1800 App">

  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Other libraries go here -->
  <link rel="stylesheet" href="styles/style.css">

  <link rel="stylesheet" href="./node_modules/leaflet/dist/leaflet.css" />
  <script src="./node_modules/leaflet/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

  <!------------------------------>
  <!-- Your HTML Layout go here -->
  <!------------------------------>
  <!-- Stuff for body goes here -->




  <!--Map-->
  <div id="content-wrapper">


    <div id="map">
      <div id="search">
        <div id="searchBar">
          <input id="searchInput" type="text" placeholder="Search location...">
          <img src="images/search-icon-png-9965.png" id="searchIcon" alt="search" draggable="false">
          <div id="searchResults"></div>
        </div>
      </div>
    </div>

    <div id="location-popup" style="display: none;">
      <button id="close-location-button" type="button">X</button>
      <div id="location-content">
        <h1 id="location-name">Location Name</h1>
        <div id="crowd-info">
          Crowd Estimate: 20 people
        </div>
        <div id="buttons">
          <button id="rate-location-button" type="button">Rate</button>
          <button class="bookmark-btn" id="bookmark-btn" title="Save location">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
            </svg>
          </button>
        </div>
        <div id="location-feed"></div>
      </div>
    </div>

    <div id="location-overlay"
      style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); align-items:center; justify-content:center; z-index:999;">
      <div
        style="background:#fff; border-radius:12px; border:1px solid #e2e6ea; padding:1.75rem; width:100%; max-width:380px; margin:1rem;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:0.75rem;">
          <div
            style="width:36px; height:36px; border-radius:50%; background:#ddeeff; display:flex; align-items:center; justify-content:center;">
            📍
          </div>
          <h2 style="font-size:16px; font-weight:500; margin:0; color:#111;">
            Looks like you're near <span id="popup-location-name" style="color:#1a6fc4;"></span>
          </h2>
        </div>
        <p style="font-size:14px; color:#666; margin:0 0 1.5rem;">Would you like to rate this location?</p>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button id="close-rate-btn"
            style="background:#fff; color:#333; border:1px solid #d0d5dd; padding:0 1.1rem; height:36px; border-radius:8px; cursor:pointer;">Not
            now</button>
          <button id="rate-btn"
            style="background:#111; color:#fff; border:1px solid #111; padding:0 1.1rem; height:36px; border-radius:8px; cursor:pointer;">⭐
            Rate it</button>
        </div>
      </div>
    </div>

  </div>

  <real-footer></real-footer>
  <!---------------------------------------------->
  <!-- Your own JavaScript functions go here    -->
  <!---------------------------------------------->

  <!-- Link to scripts of your own -->
  <script type="module" src="src/main.js"></script>
  <script type="module" src="src/map.js"></script>
  <script src="src/components/NavBarTemplate.js"></script>
  <script src="src/components/FooterTemplate.js"></script>
  <script src="leaflet/leaflet.js"></script>

  <!-- <script type="module" src="./src/main.js"></script> -->

</body>

</html>
