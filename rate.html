  <div class="content-wrapper">

    <div id="rate-page">
      <div id="rate-upper">
        <p>Looks like you're near <b id="user-location">BC Place</b>. Show us how many people there are!</p>
      </div>

      <div id="rate-lower">
        <div id="upload-wrapper">
          <input id="upload-image" type="file" accept="image/*" style="display: none;" />
          <label for="upload-image" id="upload-image-button">
            Upload Image
          </label>
          <img id="upload-image-preview">

        </div>

        <div id="input-wrapper" style="align-content: baseline;">
          <div>
          <label for="headcount">Description:</label>
          <br/>
          <textarea id="post-caption" rows="4" cols="50" style="resize:none;"></textarea>
          </div>
          <div>
            <label for="headcount">Headcount estimate:</label>
            <br/>
          <input type="number" id="headcount-input" name="headcount" required size="7" min="0" step="1" />
          
          </div>
          <div>
            <button id="submit-button" value="Submit">Submit</button>
            </div>
          </div>
      </div>

    </div>
