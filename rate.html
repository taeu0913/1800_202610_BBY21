<!DOCTYPE html>
<html lang="en">

<head>
  <title>Crowd/Source</title>
  <meta name="comp1800 template" content="My 1800 App">

  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Other libraries go here -->
  <link rel="stylesheet" href="styles/style.css">

</head>

<body>

  <!------------------------------>
  <!-- Your HTML Layout go here -->
  <!------------------------------>
  <!-- Stuff for body goes here -->
  <div class="content-wrapper">
    <div id="rate-content">
      <p>Looks like you're near <b id="user-location">BC Place</b>. Show us how many people there are!</p>
      <label for="upload-image" id="upload-image-button">
        Upload Image
      </label>

      <input 
        id="upload-image" 
        type="file" 
        accept="image/*" 
        style="display: none;" 
      /> <br><br>
      <img id="upload-image-preview"/>
      <textarea id="post-caption" rows="4" cols="50"></textarea>
      <!-- <button id="upload-image-button">Upload Photo</button><br><br> -->
      <label for="headcount">Headcount estimate:</label><br><br>
      <input type="number" id="headcount-input" name="headcount" required size="7" /><br><br>
      <input type="submit" id="submit-button" value="Submit">
    </div>
  </div>
  <real-footer></real-footer>
  <!---------------------------------------------->
  <!-- Your own JavaScript functions go here    -->
  <!---------------------------------------------->

  <!-- Link to scripts of your own -->
  <script type="module" src="src/rate.js"></script>
  <script src="src/components/NavBarTemplate.js"></script>
  <script src="src/components/FooterTemplate.js"></script>

  <!-- <script type="module" src="./src/main.js"></script> -->

</body>

</html>
